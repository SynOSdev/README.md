# ~/.tmux.conf — Syn_OS Tmux Configuration
# Merged from hostconfig repo — deduplicated and upgraded

# ---------- General ----------
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g history-limit 50000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0
set -g focus-events on
set -g set-clipboard on

# ---------- Prefix ----------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ---------- Key Bindings ----------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind c new-window -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# ---------- Status Bar ----------
set -g status-position bottom
set -g status-interval 5
set -g status-style 'bg=colour235 fg=colour255'
set -g status-left '#[fg=colour46,bold][synos] '
set -g status-left-length 20
set -g status-right '#[fg=colour245]%Y-%m-%d #[fg=colour255]%H:%M '
set -g status-right-length 50

setw -g window-status-current-style 'fg=colour46 bg=colour238 bold'
setw -g window-status-current-format ' #I:#W#F '
setw -g window-status-style 'fg=colour250 bg=colour235'
setw -g window-status-format ' #I:#W#F '

# ---------- Pane Borders ----------
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=colour46'
