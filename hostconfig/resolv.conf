# /etc/resolv.conf — Syn_OS DNS Resolver Configuration
# Merged from hostconfig repo — deduplicated and upgraded

# ---------- Primary DNS ----------
# Cloudflare DNS (privacy-focused, no logging)
nameserver 1.1.1.1
nameserver 1.0.0.1

# ---------- Fallback DNS ----------
# Quad9 DNS (malware-blocking)
nameserver 9.9.9.9

# ---------- Options ----------
options timeout:2
options attempts:3
options rotate
options edns0
